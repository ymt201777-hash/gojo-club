  <!-- ▼▼▼ この記事の中身を「上から順に」並べるだけ ▼▼▼ -->
  <script>
  window.ARTICLE = {
    slug: "tohoku",
    date: "2014.5",
    title: "東北への震災復興支援を開始しました。",
    description: "2014年5月、東北への震災復興支援を開始しました。サッカーを通じて被災地の子どもたちを笑顔にする活動と、福島復興支援についてご報告します。",

    eyecatch: { src: "tohoku-top.svg", alt: "東日本大震災 復興支援" },

    prev: "nepal",
    next: "soccer-festival",

    body: [
      { p: "貧しい国でサッカーを教えて支援をしていきたいと考えた時がありました。英語の勉強をしたり、日本人が監督をしている外国チームが日本に遠征に来た時には見学にも行って海外の選手を教えることと行くことはどのような苦労があるかを聞いたりしました。海外での指導には大きな壁を感じ海外での指導を諦めかけていた時東日本大震災が起きました。日本でやらなければならないことがあると強く思い自分でもできる活動や支援の在り方を考えました。" },

      { p: "「サッカーの力で被災地の子どもたちを笑顔にできないか」そんなことを考えているとき、岩手の親友の消息が確認されたので連絡をし、物資支援を始めました。5月に行ったサッカーフェスティバルで物資を集めました。たくさんの子供服や日常品が集まり多くの支援物資を送ることができました。物だけでない支援を考えた時に現地での交流を計画にうつしました。" },

      { p: "8月に岩手の大槌で元Jリーグ監督ゼムノビッチ氏のサッカー教室をひらきました。岩手では正気を失った人が線路を歩いていたようで電車が遅れました。山間部から海辺に出ようとした時突然津波の惨事が身に飛び込んできました。ある一線を越えると家や車がつぶれた状態で集められていました。被災地に来たのだと実感がわきました。サッカー教室は地元サッカークラブの選手に集まってもらいましたが、監督のお母さまは津波の被害にあわれたことを聞くとサッカーをしていていいのか自問もしました。当日自衛隊の拠点となったグラウンドで物資が集められたテントの横を使ってサッカー教室をしました。サッカーを楽しむ子供たちとそれを楽しそうにみる父兄の方々の姿にサッカー教室の意義を感じました。スポーツが持っている力を感じた場面です。東北震災でも特に力を注いだのは福島復興支援。福島の友人からの年賀状に「復興は始まりません」と書いてあり、すぐに電話をして福島の現状を知りました。1月3日の五条クラブとして五条高校サッカー部OB会で福島の現状を伝えて募金してもらいました。15日には福島市内でサッカー教室をすることになりました。中学校の先生からは「中学校より小学校のほうが制限が厳しく子供たちが心配」と聞かされました。" },

      { p: "外でサッカーができない小学生に何かしてあげたい。外でできないなら、福島の子どもたちをJリーグの試合に招待することを考えました。取り合えず、帰りの新幹線を待つ福島駅で招待用の観光バスを予約したことを覚えています。愛知に帰ってきて福島市内の小学校やサッカーチームの様子を調べました。呼び方もわからない金谷川小学校を知り、Jリーグ観戦に招待しました。" },

      { imgs: ["detail-08.png", "detail-10.png"], alt: ["", ""] },

      { p: "大変な県がある中、福島での復興支援に力を入れた理由は福島への支援が他の県より遅れていることに違和感を募らせたからです。宮城・岩手のサッカー教室には支援されたユニホームを着ている子供たちが多くいるが、福島は支援されている形跡がない。プロ選手の訪問がなく、それによって取材もされていないので東北の中でも支援の差ができていると思った。これを何とかしたい。" },

      { p: "中学校・小学校のサッカー教室をしていくうちに福島市内での活動の制限から子供達に思いっきりサッカーを楽しんでほしいと思ってきました。可能なら愛知に招待して放射能を気にしない活動をさせてあげたい。五条クラブと顧問をしていた部活とで企画して愛知県に招待しました。福島の方々には「宝くじに当たったみたい」と喜んでもらえました。" },

      { p: "私は小学校のころ家にアメリカ人がホームステーした時の驚きと感動が今でも忘れられません。ホテルでの生活ではなく当時顧問をしていた部員宅で寝泊まりすることでより交流が深まると思いホームステーを部員宅に提案しました。ご家庭からは「支援がしたいと思っていたのでこういう形で支援できて嬉しい」「子供に支援の機会を作ってくれてありがたい」などの言葉をたくさんいただきました。人を助けたいと誰もが思っている。スポーツはそんな気持ちを集める力もあることを実感しました。" }
    ]
  };
  </script>
