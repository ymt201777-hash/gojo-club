<body>

  <!-- ▼▼▼ この記事の中身を「上から順に」並べるだけ ▼▼▼ -->
  <script>
  window.ARTICLE = {
    slug: "nepal",                       // フォルダ名（URL）
    date: "2018.6",                      // 日付
    title: "ネパールへの海外支援を開始しました。",
    description: "2018年6月、ネパールへの海外支援を開始しました。サハラクラブへのサッカー支援と現地との交流活動についてご報告します。",

    // 一番上に来る画像（images/ 内のファイル名）
    eyecatch: { src: "detail-01.png", alt: "サッカー用品 ネパール" },

    // 前後の記事（フォルダ名 / 無ければ null）
    prev: "fukushima",
    next: "tohoku",

    // 本文を上から順に。 p=段落 / h3=小見出し / img=写真 / ol=番号付き / ul=箇条書き
    body: [
      { p: "「やらないよりやったほうがいい」と言って2人でネパール支援を始めました。日本で行ったサッカーでの支援活動を海外でもできないであろうかと考え始めました。ネパールにも支援と交流の活動を広げました。当初日本人でネパールサッカー代表監督の行徳さんに「支援といっても簡単に夢や希望なんて持たせれないものだと」と言われ、支援について迷っていた時に娘に「やらないよりやったほうがいい」言われ高校生の娘と2人で渡航しました。" },

      { h3: "100のトレーニング　英語に訳したノート" },
      { img: "detail-02.png", alt: "100のトレーニング 英語に訳したノート" },

      { p: "その後クラブ員や教え子・後輩など渡航人数が増えてきました。現地サッカークラブの指導も行いました。指導したことがきっかけとなり、サハラクラブ会長よりコーチ就任の要請がありました。簡単な決断ではなかったですが、先方の熱意を感じ、必要とされるならばやれることはやってみようと決断しました。47FAインストラクターとして指導者養成に携わった長年の経験を活かして、ネパールサッカー界のために少しでも貢献できればと思いました。サハラクラブから正式な書類をいただき訪問コーチに就任しました。" },

      { p: "選手にトレーニングをした後、コーチ陣にトレーニングの振り返りと指導の仕方についてディスカッションをします。選手に合ったトレーニングメニューを100通り選びました。選手もコーチも見直して復習できるように英語に訳したノートも作成しました。" },

      { p: "サハラクラブは1998年に設立された社会福祉団体です。ネパールの都市ポカラでソーシャルフットボールアカデミーを運営しています。ネパールのサッカー水準を高めることと、青少年の生きがいを生むことを目的とした活動を実施しています。アカデミーではネパールの様々な地区からストリートボーイや孤児を集めて寮生活をしています。選手は寮から学校に登校し、帰宅後にサッカーをする生活を送っています。渡航時にサッカーを指導し、指導者にはサッカーメニューを作り日本からもオンラインなどによってかかわりを持ってきました。「サッカー選手になって日本に行きたい」「ネパール代表になりたい」サッカーを通じて夢をもってくれる選手に育ちました。私はコーチとして指導者・選手の育成をし、社会貢献できる自立した大人に育てたい。サハラクラブの支援からネパールの支援に繋げたい。私は勝つための指導だけではなく、サッカー指導を通じて人を育てて街を育てることを海外でもチャレンジしました。我々が目指す支援は共に創る未来です。" },

      { img: "detail-03.png", alt: "サハラクラブでのサッカー指導" },

      { p: "現在日本在住のネパール人や現地のネパール人が支援の輪に入ってきています。「日本人がネパールを助けるのだからネパール人がネパール人を助けるのは当たり前」と心強い言葉をもらいます。国内のネパール人や現地のネパール人の協力もあり共に認め支えあう喜びを感じている。スポーツは国を超え時間を超え人を繋ぐ。私はスポーツで得た絆のすばらしさを伝え続けるとともに、サッカー指導を通じてウガンダの地でも大切な絆を未来につなげていきたいと強く願っています。" },

      { p: "世界には安全に日常生活を送ることができない所がある。スポーツは安全な日常生活が成り立ってはじめて成立する。ウガンダの地でもスポーツが本来持っている楽しさを味わい充実した人生を過ごせるよう「健康な人づくり・街づくり」をしていきたい。そしてその担い手となる人をスポーツを通して育てていきたいと考える。" },

      { p: "貧しい人を助けるのに理由が必要だとは思いませんが、遠くのあの子とのつながりを作ることもネパール人が言う「徳をつむ」ことになるのでしょう。「ネパール人は日本人のようにお金はないが、今が幸せと思う心持ちがある」とネパール人に教えられました。サハラクラブの支援をネパールの支援に繋げていきたいです。そしてその支援の先には、あらゆる場所で「今が幸せ」と思える未来を目指したいと思っています。ウガンダの地にも「今が幸せ」をサッカー指導を通じて広めていきたいです。" },

      { h3: "支援の段階" },

      { p: "<strong>支援１</strong>" },
      { ol: [
        "第１段階　生活に関する支援を行います。",
        "第２段階　第１段階の支援を継続しながら教育の支援とサッカー支援をします。"
      ] },

      { p: "<strong>サッカーとしての支援</strong>" },
      { ul: [
        "①クラブと選手の育成を助成します。",
        "②ネパール代表選手の輩出を目標とします。",
        "③サッカーコーチの育成を目指します。",
        "④サハラクラブのグラウンドを地域の子供たちの集いの場とします。"
      ] },

      { ul: [
        "①サハラクラブのグラウンドが地域の子供たちの集いの場にする。",
        "②サハラクラブの選手を地域の子供たちにとってあこがれのサッカープレーヤーにする。",
        "③サハラクラブを笑いが絶えない地域と共存しているクラブにする。",
        "④サハラクラブの出身者が社会貢献をしていく。",
        "⑤サハラクラブの支援を地域の支援につなげる。"
      ] }
    ]
  };
  </script>
  <!-- ▲▲▲ ここまで書けば下の共通スクリプトがページを組み立てます ▲▲▲ -->
