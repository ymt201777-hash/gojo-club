  <script>
  window.ARTICLE = {
    slug: "komorebi-school",
    date: "2022.2",
    title: "ウガンダの未来づくりとして現地にてKOMOREBI小学校を創設しました。",
    description: "2022年2月、ウガンダの未来づくりとして現地にKOMOREBI小学校を創設しました。",

    // トップ画像：5枚をグリッド配置
    eyecatch: { grid: ["komorebi-school-1.jpg", "komorebi-school-2.jpg", "komorebi-school-3.svg", "komorebi-school-4.jpg", "komorebi-school-5.jpg"], alt: ["", "", "", "", ""] },

    prev: "uganda-embassy-60th",
    next: "dubai-expo",

    body: [
      { p: "平和を取り戻し、未来に躍進を誓ったウガンダに今、日本企業の進出が目覚ましい。日本企業と共に、ウガンダの発展が進んでいる。未来の担い手となる子供に、教育の機会を提供することがウガンダの発展につながると考える。こんな時、日本人として教育の力でウガンダの発展に寄与したいと思っています。" },

      { p: "ウガンダでは教育の必要性は周知されています。成績優秀者が多く出る学校には、遠方からでも通えるように寮がある。経済的に余裕のある家庭では、寮に泊まるボーディングスクールに通わせることが多い。年度途中でも転校する子や授業料が払えなくて帰させられる子供によって、生徒が減ることを見越して募集を多めにする。40人ほど入る教室に100人ほど入り、机が足りなくて床に座り授業受ける子供も少なくはない。遠方から通う子供たちが卒業まで通い続けられずに辞めてしますことも多くみられる。卒業は35％程である。現実的に教育の充実にはまだ隔たりがある。また、給与が少なく教員のなり手が少ないことや教員の責任感に差があることも問題であると考える。教育環境改善が必要である。" },

      { p: "今回、ウガンダ大使館職員のウガンダ人ラムヌ・ルーシーと協力して学校作りをしてきました。" },

      { h3: "KOMOREBIという学校への想い。" },

      { p: "「こもれび」の持つ意味は、木々の葉のすきまから射す日の光で、まばゆくて目を閉じてしまうほどに美しいもの。魔法のように心をゆさぶる、穏やかであたたかい幸せな気持ちにさせると記されている。" },

      { p: "我々はさんさんと降り注ぐ支援はできない。しかし、限りあるほんの少しの支援ではありますが、我々の支援活動で子供達が幸せになってほしいと願っています。" },

      { p: "また、木漏れ日はたくさんの方向に延びている光です。ここを育った子供達が木漏れ日のように多方面で活躍し、ウガンダに貢献できるようになって欲しいと願っています。" },

      { h3: "地元の協力体制" },

      { p: "心強いのが、OMORO自治区の地元の人々です。日本人とウガンダ人が共に行うウガンダのためになる活動に全面協力してくれます。我々が行った未知の世界での学校作りが現実に進められているのは、日本人とウガンダ人の共に頑張ろうという本気の気持ちだと感じました。子供のためにいいことを地元の方々は真剣に望んでくれます。" },

      { p: "KOMOREBIの地で歓迎会をしていただきました。コミュニティの方々500人以上集まりました。5時間ほどのセレモニーには国会議員、地元教育委員会などから参加多数でKOMOREBI小学校への期待の大きさが知れました。国旗掲揚塔に日本とウガンダの国旗を掲げていただきました。強いつながりを感じています。" },

      { imgs: ["komorebi-school-body-1.jpg", "komorebi-school-body-2.jpg", "komorebi-school-body-3.jpg", "komorebi-school-body-4.jpg"], alt: ["", "", "", ""] },

      { p: "現在KOMOREBI小学校に通いたいと他地区の集落から要望が多く、地元の長達が話し合った結果、子供たちのためならばと集落を繋げる道を作ることになりました。KOMOREBI小学校を作ったことが発端で地域が子供たちのために一丸となったことは驚きながらも嬉しいことである。地元の人は「今グル県は教育に対する意識が変わりつつあることを感じている」と言います。今回サッカー指導を通じて教育環境改善プログラムは地元に受け入れられると確信しています。" },

      { p: "OMORO自治区全体の教育環境を向上させるチャンスだと考えています。" },

      { img: "komorebi-school-body-5.jpg", alt: "" },

      { p: "「 IKEDA ROAD 」と私の名前を付けていただいた地域のための道" },

      { h3: "サッカー指導から教育環境改善を行う" },

      { p: "五条クラブは、サッカースクールやテニススクールを実施してきた実績があります。サッカー指導を通じて国内外で価値ある実績を上げてきました。この実績を強みとしてウガンダでもサッカースクールを開設します。" },

      { p: "我々の強みは国内外で行ってきたサッカーを通じた地域交流と地域環境改善である。勝つことだけを目的にした指導ではなく人と地域を育てるサッカー指導です。" },

      { p: "サッカー指導はサッカーアカデミーとしても活動します。" },

      { p: "金・土・日の2泊3日の短期集中型と長期休業中に泊まり込みで行う長期宿泊型の2パターンを作成します。年間を通じて行うことと選手の地域を固定しないこともプロジェクト達成には必要なことである。またアカデミーに参加する年齢も低学年からにしなくてはならないと考えています。そして指導する指導者の育成も重要であると考えます。私はサッカー指導者養成講座の講師として日本サッカー協会公認インストラクターを20年以上担当しています。この実績はウガンダのサッカー指導者養成にも貢献できると確信しています。そして30年以上の教員生活で培った人を育てた経験を生かしてウガンダの教育環境改善につなげたいと考えています。" },

      { p: "KOMOREBI内に設立するサッカースクールではネパールで行ってきたようにサッカー指導を通じた人間教育と地域コミュニティーの場とします。サッカー指導の中に規律指導・衛生指導・教育に関する意識指導を行っていきます。学校卒業が35％程のこの地域の卒業率を改善するために就学意識の向上につなげていきます。広範囲から参加するサッカー指導者や選手にサッカー指導を通じて正しい教育を行うことでその影響が地元の学校に良い影響をもたらすことになると考えています。" },

      { p: "この動きを広く広めてグル県の教育環境改善につなげていくことを目標とします。" }
    ]
  };
