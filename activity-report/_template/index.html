<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ============================================================
       【新しい活動報告の作り方】
       1. この _template フォルダをコピーして、フォルダ名を記事の slug
          （例: uganda-letter）に変える。場所は activity-report/ の直下。
       2. 下の ARTICLE を上から順に書き換える。
          ・写真は images/ にファイルを置いて、ファイル名だけ書く。
          ・本文ブロックは body: [ ] の中に「上から順に」並べるだけ。
            { p:  "段落テキスト" }            … ふつうの本文（強調は <strong>太字</strong>）
            { h3: "小見出し" }                … 見出し
            { img:"detail-02.png", alt:"説明"} … 本文中の写真（1枚）
            { imgs:["a.png","b.png"] }        … 写真を横並び（2枚以上）
            { ol: ["1つ目", "2つ目"] }         … 番号付きリスト
            { ul: ["①…", "②…"] }              … 箇条書き
       3. 一覧ページ activity-report/index.html のカードのリンク先
          （href="slug/"）と前後ナビ（prev / next）を必要に応じて更新。
       ============================================================ -->
  <script>
  window.ARTICLE = {
    slug: "",                 // ← フォルダ名と同じにする（例: "uganda-letter"）
    date: "",                 // ← 例: "2023.7"
    title: "",                // ← 記事タイトル
    description: "",          // ← 検索結果やSNSに出る説明文（1〜2文）

    eyecatch: { src: "", alt: "" },   // ← 一番上の画像（例: src:"report-03.jpg"）

    prev: null,               // ← 前の記事の slug（無ければ null）
    next: null,               // ← 次の記事の slug（無ければ null）

    body: [
      { p: "" }
      // ↑ 必要なだけ下に追加していく。例：
      // ,{ h3: "小見出し" }
      // ,{ img: "detail-02.png", alt: "写真の説明" }
      // ,{ imgs: ["detail-08.png", "detail-10.png"], alt: ["", ""] }
      // ,{ p: "次の段落…" }
      // ,{ ol: ["1つ目", "2つ目"] }
      // ,{ ul: ["①…", "②…"] }
    ]
  };
  </script>

  <script src="/activity-report/report-detail.js"></script>
</body>
</html>
